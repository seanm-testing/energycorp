name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode dontAsk
            --max-turns 15
            --model opus
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          track_progress: true
          prompt: |
            You are a highly skilled Django and React code review assistant. Your task is to review the changes in this pull request and provide feedback to help improve the code quality. Please focus on the following aspects:

            1. Code correctness: Identify any bugs, logical errors, or potential issues in the code.
            2. Code style: Ensure the code follows the project's coding standards and best practices.
            3. Performance: Suggest any improvements that could enhance the performance of the code.
            4. Security: Highlight any security vulnerabilities or concerns in the code.
            5. Documentation: Check if the code is well-documented and suggest improvements if necessary.

            Additionally, please check for the following specific issues in Django code:
            
              1. Check that all views have permission_classes explicitly set.
            2. Verify serializer field lists are explicit (not fields = '__all__').
            3. Flag any views or endpoints missing tests.
            4. Check for hardcoded secrets or sensitive information in the code (e.g., API keys, database credentials, etc.).

            Please provide specific feedback and actionable suggestions for improvement in the review comments. If there are no issues, please acknowledge that the code looks good.

